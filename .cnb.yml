master:
  web_trigger_all:
    - services:
        - docker
      docker:
        image: cnbcool/default-build-env:latest
        volumes:
          - /root/
      stages:
        - name: docker login
          script:
            - docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}

        - name: 构建:nodejs24
          script:
            - cd ./nodejs/24
            - docker build -t ${CNB_DOCKER_REGISTRY}/php127/docker/nodejs:24-alpine .
            - docker push ${CNB_DOCKER_REGISTRY}/php127/docker/nodejs:24-alpine

        - name: 构建:nodejs22
          script:
            - cd ./nodejs/22
            - docker build -t ${CNB_DOCKER_REGISTRY}/php127/docker/nodejs:22-alpine .
            - docker push ${CNB_DOCKER_REGISTRY}/php127/docker/nodejs:22-alpine

        - name: 构建:nodejs20
          script:
            - cd ./nodejs/20
            - docker build -t ${CNB_DOCKER_REGISTRY}/php127/docker/nodejs:20-alpine .
            - docker push ${CNB_DOCKER_REGISTRY}/php127/docker/nodejs:20-alpine

        - name: 构建:nodejs18
