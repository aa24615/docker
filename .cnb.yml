            - docker build -t ${CNB_DOCKER_REGISTRY}/php127/docker/nodejs:18-alpine .
            - docker push ${CNB_DOCKER_REGISTRY}/php127/docker/nodejs:18-alpine

        - name: 构建:nodejs16
