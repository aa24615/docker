        - name: 构建:php74-fpm-nginx
          script:
            - cd ./php/7.4/fpm-alpine-nginx
            - docker build -t ${CNB_DOCKER_REGISTRY}/php127/docker/php:7.4.33-fpm-alpine-nginx .
            - docker push ${CNB_DOCKER_REGISTRY}/php127/docker/php:7.4.33-fpm-alpine-nginx

        - name: 构建:php74-fpm
